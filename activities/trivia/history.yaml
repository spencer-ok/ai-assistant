  - q: "What year did the United States declare independence?"
    a: "1776"
    hint: "It's in the seventeen hundreds"
    difficulty: easy

  - q: "Who wrote the Declaration of Independence?"
    a: "Thomas Jefferson"
    hint: "He later became the third President"
    difficulty: easy

  - q: "What was the name of the ship the Pilgrims sailed on to America?"
    a: "The Mayflower"
    hint: "It's named after a flower that blooms in spring"
    difficulty: easy

  - q: "Which President freed the slaves?"
    a: "Abraham Lincoln"
    hint: "He wore a tall top hat and had a beard"
    difficulty: easy

  - q: "What year did World War II end?"
    a: "1945"
    hint: "It's in the nineteen forties"
