# Unified activity triggers — any of these open the activity menu
triggers:
  - "activity"
  - "play a game"
  - "let's play"
  - "trivia"
  - "quiz me"
  - "word game"
  - "guessing game"
  - "let's do something"
  - "i'm bored"

# All available activities
activities:
  - name: "Trivia"
    enabled: true
    trigger: ["trivia", "quiz", "quiz me"]
    categories:
      - name: "TV Shows"
        trigger: ["tv", "tv shows", "television"]
        topics:
          - name: "Star Trek: The Next Generation"
            trigger: ["star trek", "next generation", "tng", "picard"]
            file: "trivia/star_trek_tng.yaml"
          - name: "Little House on the Prairie"
            trigger: ["little house", "prairie", "laura ingalls"]
            file: "trivia/little_house.yaml"
      - name: "General Knowledge"
        trigger: ["general", "general knowledge", "random"]
        topics:
          - name: "Animals"
            trigger: ["animals", "animal"]
            file: "trivia/animals.yaml"
          - name: "History"
            trigger: ["history"]
            file: "trivia/history.yaml"

  - name: "Word Games"
    enabled: false
    trigger: ["word game", "word games", "guessing game", "guess"]
    categories:
      - name: "Animal Guessing"
        trigger: ["animal", "animals"]
        file: "word_games/animals.yaml"
      - name: "What Am I?"
        trigger: ["what am i", "objects", "things", "riddle", "riddles"]
        file: "word_games/what_am_i.yaml"

  - name: "Stories"
    enabled: false
    trigger: ["story", "stories", "tell me a story"]

  - name: "Jokes"
    enabled: false
    trigger: ["joke", "jokes", "funny"]

  - name: "Reminiscing"
    enabled: false
    trigger: ["reminisce", "remember when", "old days", "memories"]
