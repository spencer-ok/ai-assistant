<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosie</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; transition: background-color 0.5s; }
  body.listening { background: #0a4a0a; }
  body.thinking { background: #4a0a0a; }
  body.speaking { background: #4a0a0a; }

  #main { flex: 1; display: flex; flex-direction: column; }
  #face { flex: 0 0 auto; display: flex; align-items: center; justify-content: center; min-height: 180px; }
  .eyes { display: flex; gap: 60px; }
  .eye { width: 80px; height: 80px; background: #fff; border-radius: 50%; position: relative; transition: all 0.3s; }
  .eye .pupil { width: 30px; height: 30px; background: #16213e; border-radius: 50%; position: absolute; top: 25px; left: 25px; transition: all 0.2s; }
  body.listening .eye { background: #4ecca3; }
  body.thinking .eye { animation: pulse 1s infinite; }
  body.speaking .eye .pupil { animation: look 2s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  @keyframes look { 0%,100% { left: 25px; } 25% { left: 35px; } 75% { left: 15px; } }

  #clock { text-align: center; font-size: 3.5em; color: #fff; padding: 5px; letter-spacing: 2px; }
  #clock-date { text-align: center; font-size: 1.2em; color: #888; padding-bottom: 8px; }
  #state-emoji { text-align: center; font-size: 4em; padding: 5px; min-height: 70px; }
  #status { text-align: center; padding: 8px; font-size: 1.6em; color: #4ecca3; }
  #speech { text-align: center; padding: 8px 20px; font-size: 1.8em; color: #e8e8e8; font-style: italic; min-height: 50px; }

  #transcript { flex: 1; overflow-y: auto; padding: 10px 20px; border-top: 1px solid #333; font-size: 1.4em; }
  .msg { padding: 8px 0; }
  .msg.user { color: #4ecca3; }
  .msg.rosie { color: #e8e8e8; }
  .msg .label { font-weight: bold; font-size: 0.85em; }

  #controls { display: flex; gap: 10px; padding: 15px 20px; background: #16213e; }
  #textbox { flex: 1; padding: 14px; font-size: 1.4em; border: 1px solid #4ecca3; border-radius: 8px; background: #1a1a2e; color: #eee; outline: none; font-family: Arial, Helvetica, sans-serif; }
  #textbox::placeholder { color: #666; }
  button { padding: 14px 20px; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; font-family: Arial, Helvetica, sans-serif; }
  #sendbtn { background: #4ecca3; color: #1a1a2e; font-weight: bold; }
  #stopbtn { background: #e74c3c; color: #fff; font-weight: bold; }
  #mutebtn { background: none; color: #4ecca3; font-size: 1.8em; padding: 10px 14px; }
  #mutebtn.muted { color: #e74c3c; }
  #mutebtn.wake { color: #f39c12; }
  #exitbtn { background: #800; color: #fff; font-size: 0.9em; padding: 10px 14px; }
  #cg-toggle { background: #4ecca3; color: #1a1a2e; font-weight: bold; font-size: 0.9em; padding: 10px 16px; }

  #caregiver { width: 320px; background: #16213e; border-left: 2px solid #4ecca3; padding: 20px; display: none; flex-direction: column; overflow-y: auto; }
  #caregiver.open { display: flex; }
  #caregiver h2 { color: #4ecca3; margin-bottom: 12px; font-size: 1.3em; }
  #cg-messages { flex: 1; overflow-y: auto; }
  .cg-msg { padding: 8px 0; border-bottom: 1px solid #333; font-size: 1.1em; }
  .cg-msg .cg-from { color: #4ecca3; font-weight: bold; }
  .cg-msg .cg-time { color: #666; font-size: 0.85em; }
  #cg-form { margin-top: 10px; }
  #cg-form input, #cg-form select { width: 100%; padding: 10px; font-size: 1.1em; border: 1px solid #4ecca3; border-radius: 6px; background: #1a1a2e; color: #eee; font-family: Arial, Helvetica, sans-serif; margin-bottom: 8px; }
  #cg-sendbtn, #cg-recordbtn { width: 100%; padding: 10px; font-weight: bold; border: none; border-radius: 6px; font-size: 1.1em; cursor: pointer; margin-bottom: 6px; }
  #cg-sendbtn { background: #4ecca3; color: #1a1a2e; }
  #cg-recordbtn { background: #555; color: #fff; }
</style>
</head>
<body class="idle">

<div id="main">
  <div id="face">
    <div class="eyes">
      <div class="eye"><div class="pupil"></div></div>
      <div class="eye"><div class="pupil"></div></div>
    </div>
  </div>

  <div id="clock"></div>
  <div id="clock-date"></div>
  <div id="state-emoji"></div>
  <div id="status">Ready</div>
  <div id="speech"></div>
  <div id="transcript"></div>

  <div id="controls">
    <input id="textbox" type="text" placeholder="Type a message..." autocomplete="off">
    <button id="sendbtn">Send</button>
    <button id="stopbtn">Stop</button>
    <button id="mutebtn" title="Toggle microphone">&#x1F3A4;</button>
    <button id="cg-toggle">Notes</button>
    <button id="exitbtn" title="Shutdown Rosie">Exit</button>
  </div>
</div>

<div id="caregiver">
  <h2>Caregiver Notes</h2>
  <div id="cg-messages"><div style="color:#666">No notes yet</div></div>
  <div id="cg-form">
    <input id="cg-from" type="text" placeholder="Your name" value="Val">
    <select id="cg-from-select" style="display:none"></select>
    <input id="cg-text" type="text" placeholder="Leave a note..." autocomplete="off">
    <button id="cg-sendbtn">Send Note</button>
    <button id="cg-recordbtn">Record Note</button>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
