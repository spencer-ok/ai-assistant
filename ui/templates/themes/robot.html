<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rosie</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, Helvetica, sans-serif; background: #0a0a1a; color: #eee; height: 100vh; display: flex; overflow: hidden; }
  body.listening { }
  body.thinking { }
  body.speaking { }

  #main { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; overflow: hidden; }
  #top { width: 100%; display: flex; flex-direction: column; align-items: center; transition: background-color 0.5s; background: #0a0a1a; }
  body.listening #top { background: #0a3d0a; }
  body.thinking #top { background: #3d0a0a; }
  body.speaking #top { background: #3d0a0a; }

  /* Robot head */
  #robot-head { position: relative; margin-top: 20px; width: 280px; height: 200px; background: linear-gradient(180deg, #3a3a5a, #2a2a3a); border-radius: 140px 140px 80px 80px; border: 3px solid #4ecca3; box-shadow: 0 0 20px rgba(78, 204, 163, 0.3); display: flex; align-items: center; justify-content: center; }

  /* Antenna */
  #robot-head::before { content: ''; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); width: 4px; height: 30px; background: #4ecca3; }
  #robot-head::after { content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; background: #4ecca3; border-radius: 50%; box-shadow: 0 0 10px #4ecca3; animation: blink-antenna 2s infinite; }
  @keyframes blink-antenna { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Eyes */
  .eyes { display: flex; gap: 50px; margin-top: -10px; }
  .eye { width: 60px; height: 60px; background: #0ff; border-radius: 50%; position: relative; box-shadow: 0 0 15px rgba(0,255,255,0.5); transition: all 0.3s; }
  .eye .pupil { width: 20px; height: 20px; background: #0a0a1a; border-radius: 50%; position: absolute; top: 20px; left: 20px; transition: all 0.2s; }

  body.listening .eye { background: #0f0; box-shadow: 0 0 20px rgba(0,255,0,0.6); }
  body.thinking .eye { animation: pulse 1s infinite; background: #ff0; box-shadow: 0 0 20px rgba(255,255,0,0.6); }
  body.speaking .eye { background: #0ff; animation: speak-glow 0.5s infinite alternate; }
  body.speaking .eye .pupil { animation: look 2s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  @keyframes look { 0%,100% { left: 20px; } 25% { left: 28px; } 75% { left: 12px; } }
  @keyframes speak-glow { from { box-shadow: 0 0 15px rgba(0,255,255,0.5); } to { box-shadow: 0 0 30px rgba(0,255,255,0.8); } }

  /* Mouth - LED bar */
  #mouth { position: absolute; bottom: 35px; display: flex; gap: 4px; }
  #mouth span { width: 8px; height: 8px; background: #333; border-radius: 50%; transition: background 0.1s; }
  body.speaking #mouth span { background: #0ff; animation: mouth-led 0.3s infinite alternate; }
  body.speaking #mouth span:nth-child(2) { animation-delay: 0.05s; }
  body.speaking #mouth span:nth-child(3) { animation-delay: 0.1s; }
  body.speaking #mouth span:nth-child(4) { animation-delay: 0.15s; }
  body.speaking #mouth span:nth-child(5) { animation-delay: 0.2s; }
  @keyframes mouth-led { from { background: #066; } to { background: #0ff; } }

  /* Clock */
  #clock { font-size: 3em; color: #4ecca3; padding: 10px; letter-spacing: 3px; font-variant-numeric: tabular-nums; text-shadow: 0 0 10px rgba(78,204,163,0.5); }
  #clock-date { font-size: 1.1em; color: #666; padding-bottom: 5px; }

  /* State */
  #state-emoji { font-size: 3em; padding: 5px; }
  #status { font-size: 1.4em; color: #4ecca3; padding: 5px; text-transform: uppercase; letter-spacing: 2px; }

  /* Speech */
  #speech { text-align: center; padding: 8px 20px; font-size: 1.6em; color: #0ff; min-height: 50px; text-shadow: 0 0 5px rgba(0,255,255,0.3); }

  /* Transcript */
  #transcript { width: 100%; flex: 1; overflow-y: auto; padding: 10px 30px; border-top: 1px solid #1a1a3a; font-size: 1.3em; min-height: 0; }
  .msg { padding: 6px 0; }
  .msg.user { color: #4ecca3; }
  .msg.rosie { color: #aadde8; }
  .msg .label { font-weight: bold; font-size: 0.85em; }

  /* Controls */
  #controls { width: 100%; display: flex; gap: 10px; padding: 15px 30px; background: #0d0d20; border-top: 1px solid #1a1a3a; }
  #textbox { flex: 1; padding: 14px; font-size: 1.3em; border: 1px solid #4ecca3; border-radius: 8px; background: #0a0a1a; color: #eee; outline: none; font-family: Arial, Helvetica, sans-serif; }
  #textbox::placeholder { color: #444; }
  #textbox:focus { box-shadow: 0 0 10px rgba(78,204,163,0.3); }
  button { padding: 14px 20px; border: none; border-radius: 8px; font-size: 1.2em; cursor: pointer; font-family: Arial, Helvetica, sans-serif; }
  #sendbtn { background: #4ecca3; color: #0a0a1a; font-weight: bold; }
  #stopbtn { background: #e74c3c; color: #fff; font-weight: bold; }
  #mutebtn { background: none; color: #4ecca3; font-size: 1.8em; padding: 10px 14px; }
  #mutebtn.muted { color: #e74c3c; }
  #exitbtn { background: #400; color: #f88; font-size: 0.9em; padding: 10px 14px; }
  #cg-toggle { background: #2a2a4a; color: #4ecca3; font-weight: bold; font-size: 0.9em; padding: 10px 14px; border: 1px solid #4ecca3; }

  /* Caregiver panel */
  #caregiver { width: 320px; background: #0d0d20; border-left: 2px solid #4ecca3; padding: 20px; display: none; flex-direction: column; overflow-y: auto; }
  #caregiver.open { display: flex; }
  #caregiver h2 { color: #4ecca3; margin-bottom: 12px; font-size: 1.3em; }
  #cg-messages { flex: 1; overflow-y: auto; }
  .cg-msg { padding: 8px 0; border-bottom: 1px solid #1a1a3a; font-size: 1.1em; }
  .cg-msg .cg-from { color: #4ecca3; font-weight: bold; }
  .cg-msg .cg-time { color: #555; font-size: 0.85em; }
  #cg-form { margin-top: 10px; }
  #cg-form input, #cg-form select { width: 100%; padding: 10px; font-size: 1.1em; border: 1px solid #4ecca3; border-radius: 6px; background: #0a0a1a; color: #eee; font-family: Arial, Helvetica, sans-serif; margin-bottom: 8px; }
  #cg-sendbtn, #cg-recordbtn { width: 100%; padding: 10px; font-weight: bold; border: none; border-radius: 6px; font-size: 1.1em; cursor: pointer; margin-bottom: 6px; }
  #cg-sendbtn { background: #4ecca3; color: #0a0a1a; }
  #cg-recordbtn { background: #2a2a4a; color: #eee; border: 1px solid #4ecca3; }

  /* Responsive */
  @media (max-height: 700px) {
    #robot-head { width: 180px; height: 130px; margin-top: 10px; }
    .eye { width: 40px; height: 40px; }
    .eye .pupil { width: 14px; height: 14px; top: 13px; left: 13px; }
    .eyes { gap: 30px; }
    #clock { font-size: 2em; }
    #clock-date { font-size: 0.9em; }
    #state-emoji { font-size: 2em; }
    #status { font-size: 1.1em; }
    #speech { font-size: 1.2em; }
    #mouth span { width: 6px; height: 6px; }
  }
  @media (max-width: 600px) {
    #caregiver.open { width: 100%; position: fixed; top: 0; left: 0; height: 100vh; z-index: 20; }
    #controls { flex-wrap: wrap; padding: 10px; }
    #textbox { font-size: 1.1em; }
    button { padding: 10px 14px; font-size: 1em; }
  }
  @media (min-height: 900px) {
    #robot-head { width: 320px; height: 230px; margin-top: 30px; }
    .eye { width: 80px; height: 80px; }
    .eye .pupil { width: 26px; height: 26px; top: 27px; left: 27px; }
    .eyes { gap: 60px; }
    #clock { font-size: 4em; }
    #speech { font-size: 2em; }
    #transcript { font-size: 1.5em; }
  }
</style>
</head>
<body class="idle">

<div id="main">
  <div id="top">
  <div id="robot-head">
    <div class="eyes">
      <div class="eye"><div class="pupil"></div></div>
      <div class="eye"><div class="pupil"></div></div>
    </div>
    <div id="mouth">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div id="clock"></div>
  <div id="clock-date"></div>
  <div id="state-emoji"></div>
  <div id="status">Ready</div>
  <div id="speech"></div>
  </div>
  <div id="transcript"></div>

  <div id="controls">
    <input id="textbox" type="text" placeholder="Type a message..." autocomplete="off">
    <button id="sendbtn">Send</button>
    <button id="stopbtn">Stop</button>
    <button id="mutebtn" title="Toggle microphone">&#x1F3A4;</button>
    <button id="cg-toggle">Notes</button>
    <button id="exitbtn" title="Shutdown Rosie">Exit</button>
  </div>
</div>

<div id="caregiver">
  <h2>Caregiver Notes</h2>
  <div id="cg-messages"><div style="color:#555">No notes yet</div></div>
  <div id="cg-form">
    <input id="cg-from" type="text" placeholder="Your name" value="Val">
    <select id="cg-from-select" style="display:none"></select>
    <input id="cg-text" type="text" placeholder="Leave a note..." autocomplete="off">
    <button id="cg-sendbtn">Send Note</button>
    <button id="cg-recordbtn">Record Note</button>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
