model_name: "rosie"

target_phrase:
  - "rosie"

custom_negative_phrases: []

n_samples: 10000
n_samples_val: 2000
tts_batch_size: 16
augmentation_batch_size: 16
augmentation_rounds: 1

piper_sample_generator_path: "./piper-sample-generator"
output_dir: "./my_custom_model"

rir_paths:
  - "./mit_rirs"

background_paths:
  - "./fma"

background_paths_duplication_rate:
  - 1

false_positive_validation_data_path: "./validation_features.npy"

feature_data_files:
  ACAV100M_sample: "./negative_features.npy"

batch_n_per_class:
  ACAV100M_sample: 1024
  adversarial_negative: 50
  positive: 50

model_type: "dnn"
layer_size: 32

steps: 50000
max_negative_weight: 1500
target_false_positives_per_hour: 0.2
